<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head>

        <meta charset="UTF-8">
        <title>Cajero Automático</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

        <style>

            body{
                background: linear-gradient(135deg,#4facfe,#00f2fe);
                font-family:'Segoe UI', sans-serif;
                min-height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
            }

            .atm-container{
                width:720px;
                background:white;
                border-radius:20px;
                padding:35px;
                box-shadow:0 20px 40px rgba(0,0,0,0.15);
            }

            .atm-title{
                font-weight:600;
                color:#0d6efd;
            }

            .atm-screen{
                background:#f8f9fa;
                border-radius:15px;
                padding:25px;
                margin-top:20px;
            }

            .form-control-lg{
                border-radius:10px;
            }

            .btn-retirar{
                border-radius:10px;
                font-weight:500;
                font-size:17px;
            }

            .result-box{
                background:#f8f9fa;
                padding:20px;
                border-radius:12px;
                margin-top:20px;
            }

            .table{
                border-radius:10px;
                overflow:hidden;
            }

        </style>

    </head>

    <body>

        <div class="atm-container">

            <h3 class="text-center atm-title">

                <i class="bi bi-bank2"></i>
                Cajero Automático

            </h3>

            <div class="atm-screen">

                <form action="/retirar" method="post">

                    <label class="form-label">

                        <i class="bi bi-cash-coin"></i>
                        Monto a retirar

                    </label>

                    <input
                        type="number"
                        step="0.5"
                        name="monto"
                        class="form-control form-control-lg"
                        placeholder="Ingrese el monto">

                    <button type="submit" class="btn btn-primary w-100 mt-3 btn-retirar">

                        <i class="bi bi-arrow-down-circle"></i>
                        Retirar dinero

                    </button>

                </form>

            </div>

            <div th:if="${resultado != null}" class="result-box">

                <div th:if="${resultado.Correct}">

                    <h5>

                        <i class="bi bi-receipt"></i>
                        Billetes entregados

                    </h5>

                    <ul class="list-group mt-3">

                        <li class="list-group-item d-flex justify-content-between align-items-center"
                            th:each="item : ${resultado.Object.entrySet()}">

                            <span>

                                <i class="bi bi-cash-stack text-success"></i>
                                $<span th:text="${item.key}"></span>

                            </span>

                            <span class="badge bg-success rounded-pill"
                                  th:text="${item.value}"></span>

                        </li>

                    </ul>

                </div>

                <div th:if="${!resultado.Correct}">

                    <div class="alert alert-danger">

                        <i class="bi bi-exclamation-triangle"></i>
                        <span th:text="${resultado.ErrorMessage}"></span>

                    </div>

                </div>

            </div>

            <div class="result-box mt-4" th:if="${denominaciones != null}">

                <h5>

                    <i class="bi bi-safe"></i>
                    Dinero disponible en el cajero

                </h5>

                <table class="table table-hover mt-3">

                    <thead class="table-primary">

                        <tr>

                            <th>Denominación</th>
                            <th>Cantidad</th>
                            <th>Tipo</th>
                            <th>Total</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="d : ${denominaciones}">

                            <td>

                                <i class="bi bi-cash"></i>
                                $<span th:text="${d.denominacion}"></span>

                            </td>

                            <td th:text="${d.cantidad}"></td>

                            <td th:text="${d.tipo}"></td>

                            <td class="text-success fw-bold"
                                th:text="${d.denominacion * d.cantidad}"></td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </body>

</html>
